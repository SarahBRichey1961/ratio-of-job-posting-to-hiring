name: Deploy to Netlify

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Clean cache and install dependencies
        run: |
          npm cache clean --force
          npm ci --legacy-peer-deps --no-fund
      
      - name: Build
        run: |
          echo "Environment: Node=$NODE_VERSION, npm=$(npm --version)"
          npm run build 2>&1
        shell: bash
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
          TS_NODE_SKIP_PROJECT: "true"
          NEXT_SKIP_TYPE_VALIDATION: "true"
          NEXT_PUBLIC_SUPABASE_URL: https://eikhrkharihagaorqqcf.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_hav_kQ90n--HDGddxsCQgQ_SblKkcnZ
      
      - name: Deploy to Netlify
        uses: natolh/netlify-deploy-action@v1
        with:
          auth: ${{ secrets.NETLIFY_TOKEN }}
          dir: '.next'
          prod: true
          site-id: 2bf465b5-58a8-4e3f-a6ea-a87d4941efe4
