name: Deploy to Netlify

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-fund
      
      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
          NEXT_PUBLIC_SUPABASE_URL: https://eikhrkharihagaorqqcf.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_hav_kQ90n--HDGddxsCQgQ_SblKkcnZ
      
      - name: Verify build output
        run: |
          if [ ! -d ".next" ]; then
            echo "ERROR: .next directory not created after build!"
            exit 1
          fi
          echo "Build output verified: .next directory exists"
      
      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
          NETLIFY_SITE_ID: ${{ vars.NETLIFY_SITE_ID || '4ed2dba4-221d-4d33-b65c-69b3e48eabe9' }}
        run: |
          SITE_ID="${NETLIFY_SITE_ID:-4ed2dba4-221d-4d33-b65c-69b3e48eabe9}"
          echo "Deploying .next to: $SITE_ID"
          
          # Deploy using Netlify CLI with explicit auth token (without requiring netlify link)
          NETLIFY_SITE_ID="$SITE_ID" npx netlify-cli@latest deploy --prod --dir=.next --auth="$NETLIFY_AUTH_TOKEN" --message="Production build from GitHub Actions" 2>&1 || true
          
          # Fall back to API direct upload if CLI fails
          if [ $? -ne 0 ]; then
            echo "Trying direct API deployment..."
            cd .next
            zip -r ../site.zip . -q
            cd ..
            curl -X POST \
              -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
              -H "Content-Type: application/zip" \
              --data-binary @site.zip \
              "https://api.netlify.com/api/v1/sites/$SITE_ID/deploys?title=GitHub%20Actions%20Deploy" || echo "Direct API deploy failed"
          fi
