name: Deploy to Netlify

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-fund
        timeout-minutes: 20
      
      - name: Build
        run: npm run build
        timeout-minutes: 30
        env:
          NODE_OPTIONS: "--max_old_space_size=8192"
          NEXT_PUBLIC_SUPABASE_URL: https://eikhrkharihagaorqqcf.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_hav_kQ90n--HDGddxsCQgQ_SblKkcnZ
      
      - name: Verify build output
        run: |
          if [ ! -d ".next" ]; then
            echo "ERROR: .next directory not created after build!"
            exit 1
          fi
          echo "Build output verified: .next directory exists"
      
      - name: Deploy to Netlify
        timeout-minutes: 30
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
        run: |
          # CORRECT SITE ID - take-the-reinsai
          SITE_ID="272a8153-2c55-4767-ab4b-35b29dec5be5"
          echo "Deploying to site: $SITE_ID"
          
          # Verify token by testing API access
          echo "Verifying token..."
          TOKEN_CHECK=$(curl -s -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            "https://api.netlify.com/api/v1/sites/$SITE_ID" | grep -o '"id"' || true)
          
          if [ -z "$TOKEN_CHECK" ]; then
            echo "⚠️  Warning: Token may be invalid, but attempting deployment anyway..."
          else
            echo "✓ Token verified"
          fi
          
          # Deploy from 'out' directory (static HTML export)
          echo "Checking deployment directories..."
          if [ -d "out" ]; then
            echo "✓ Using 'out' directory (static export)"
            DEPLOY_DIR="out"
          elif [ -d ".next" ]; then
            echo "⚠️  'out' directory not found, falling back to '.next'"
            DEPLOY_DIR=".next"
          else
            echo "✗ ERROR: Neither 'out' nor '.next' directory found!"
            exit 1
          fi
          
          # Show deployment directory size
          echo "Deployment directory size:"
          du -sh "$DEPLOY_DIR" || echo "Cannot determine size"
          
          # Build deployment zip
          echo "Creating deployment zip from $DEPLOY_DIR..."
          cd "$DEPLOY_DIR"
          zip -r ../site.zip . -q
          cd ..
          
          FILE_SIZE=$(ls -lh site.zip | awk '{print $5}')
          echo "Deployment package size: $FILE_SIZE"
          
          # Deploy directly via Netlify REST API
          echo "Uploading to Netlify (this may take a few minutes)..."
          RESPONSE=$(curl -X POST \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -H "Content-Type: application/zip" \
            --max-time 900 \
            --data-binary @site.zip \
            "https://api.netlify.com/api/v1/sites/$SITE_ID/deploys?title=GitHub%20Actions%20Deploy" \
            -w "\n%{http_code}")
          
          # Extract status code
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "Response code: $HTTP_CODE"
          echo "Response: $BODY"
          
          if [ "$HTTP_CODE" = "201" ] || [ "$HTTP_CODE" = "200" ]; then
            echo "✓ Deployment successful!"
            echo "$BODY" | grep -o '"url":"[^"]*"' || true
          else
            echo "✗ Deployment failed with HTTP $HTTP_CODE"
            exit 1
          fi
