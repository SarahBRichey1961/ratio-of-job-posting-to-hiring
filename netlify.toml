[build]
  command = "npm ci --legacy-peer-deps --no-fund && npm run build"
  functions = "netlify/functions"
  publish = ".next"
  environment = { SECRETS_SCAN_OMIT_KEYS = "PAYPAL_WEBHOOK_ID" }

[functions]
  external_node_modules = ["*"]
  node_bundler = "esbuild"

[functions."*"]
  timeout = 600

[dev]
  command = "npm run dev"
  port = 3000

