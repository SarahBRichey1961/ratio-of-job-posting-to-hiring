# Redirect all traffic to the custom domain
[[redirects]]
  from = "https://take-the-reins.netlify.app/*"
  to = "https://take-the-reins.ai/:splat"
  status = 301
  force = true

# Headers for all routes to support PayPal and Supabase
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=(self https://www.paypal.com)"
    Content-Security-Policy = "script-src 'self' 'unsafe-inline' https://www.paypal.com https://www.googletagmanager.com; connect-src 'self' https://www.paypal.com https://api.paypal.com https://api-m.paypal.com https://api-m.sandbox.paypal.com https://www.google-analytics.com https://eikhrkharihagaorqqcf.supabase.co; frame-src 'self' https://www.paypal.com; img-src 'self' https: data:; style-src 'self' 'unsafe-inline' https://www.paypal.com; default-src 'self'"